<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlanta Events Slideshow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eaf4e2;
      --bg-dark: #d4e7c8;
      --card: #f4fbef;
      --panel: #dbeecf;
      --panel-2: #c7dfb8;
      --panel-3: #b4d49f;
      --text: #2f4a34;
      --muted: #5f7a63;
      --accent: #90b77d;
      --accent-dark: #6f9661;
      --border: #6b8f68;
      --shadow: #b7ceb0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Press Start 2P", system-ui, sans-serif;
      color: var(--text);
      image-rendering: pixelated;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.15), rgba(255,255,255,0.15)),
        repeating-linear-gradient(
          0deg,
          var(--bg) 0px,
          var(--bg) 16px,
          var(--bg-dark) 16px,
          var(--bg-dark) 32px
        );
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 4px solid var(--border);
      box-shadow:
        0 0 0 4px var(--card),
        0 0 0 8px var(--border),
        8px 8px 0 0 var(--shadow);
      padding: 16px;
    }

    .title {
      margin: 0 0 14px;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
    }

    .frame {
      border: 4px solid var(--border);
      background: var(--panel-2);
      box-shadow: inset 0 0 0 4px #edf7e7;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
    }

    .topbar,
    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      padding: 8px 10px;
      background: var(--panel-3);
      border: 4px solid var(--border);
      font-size: 0.45rem;
      line-height: 1.6;
    }

    .body {
      display: grid;
      gap: 14px;
    }

    .event-title {
      font-size: 0.78rem;
      line-height: 1.8;
    }

    .meta {
      display: grid;
      gap: 10px;
      font-size: 0.52rem;
      line-height: 1.9;
      color: var(--muted);
    }

    .recurring-tag {
      display: inline-block;
      width: fit-content;
      padding: 6px 8px;
      background: var(--panel-3);
      border: 4px solid var(--border);
      font-size: 0.42rem;
      line-height: 1.5;
    }

    button,
    a.pixel-link {
      border: 4px solid var(--border);
      background: var(--accent);
      color: #f7fff4;
      font-family: "Press Start 2P", system-ui, sans-serif;
      font-size: 0.5rem;
      line-height: 1.6;
      padding: 10px 12px;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--shadow);
      text-decoration: none;
      display: inline-block;
    }

    button:hover,
    a.pixel-link:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: var(--panel);
      color: var(--text);
    }

    .secondary:hover {
      background: var(--panel-2);
    }

    .empty {
      text-align: center;
      font-size: 0.6rem;
      line-height: 1.8;
      color: var(--muted);
      padding: 20px;
    }

    @media (max-width: 560px) {
      .event-title { font-size: 0.62rem; }
      .meta { font-size: 0.46rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">ATLANTA EVENTS SHOWCASE</h1>

    <div class="frame">
      <div class="topbar">
        <div id="slideCount" class="badge">EVENT 0 / 0</div>
        <div id="slideDateBadge" class="badge">--</div>
      </div>

      <div class="body">
        <div id="slideTitle" class="event-title">LOADING...</div>
        <div id="slideMeta" class="meta"></div>
        <div id="slideRecurringTag"></div>
      </div>

      <div>
        <a id="slideLink" class="pixel-link" href="#" target="_blank" rel="noopener noreferrer">OPEN EVENT</a>
      </div>

      <div class="controls">
        <button id="prevBtn" class="secondary">PREV</button>
        <button id="pauseBtn" class="secondary">PAUSE</button>
        <button id="nextBtn" class="secondary">NEXT</button>
      </div>
    </div>
  </div>

  <script>
    const slideTitle = document.getElementById("slideTitle");
    const slideMeta = document.getElementById("slideMeta");
    const slideLink = document.getElementById("slideLink");
    const slideCount = document.getElementById("slideCount");
    const slideDateBadge = document.getElementById("slideDateBadge");
    const slideRecurringTag = document.getElementById("slideRecurringTag");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pauseBtn = document.getElementById("pauseBtn");

    let expandedEvents = [];
    let currentIndex = 0;
    let autoplay = true;
    let timer = null;

    function formatDate(dt) {
      return new Date(dt).toLocaleString([], {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatBadgeDate(dt) {
      return new Date(dt).toLocaleString([], {
        month: "short",
        day: "numeric"
      }).toUpperCase();
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function expandRecurringEvents(events) {
      const result = [];

      events.forEach(event => {
        if (event.recurring === "weekly" && event.recurringUntil) {
          const start = new Date(event.datetime);
          const end = new Date(event.recurringUntil + "T23:59:59");
          let current = new Date(start);

          while (current <= end) {
            result.push({
              ...event,
              datetime: current.toISOString().slice(0, 16),
              isRecurringInstance: true
            });
            current = addDays(current, 7);
          }
        } else {
          result.push({
            ...event,
            isRecurringInstance: false
          });
        }
      });

      return result.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
    }

    function showEmptyState() {
      slideTitle.textContent = "NO EVENTS YET";
      slideMeta.innerHTML = '<div class="empty">ADD EVENTS TO EVENTS.JSON</div>';
      slideCount.textContent = "EVENT 0 / 0";
      slideDateBadge.textContent = "--";
      slideRecurringTag.innerHTML = "";
      slideLink.style.display = "none";
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      pauseBtn.disabled = true;
    }

    function renderSlide(index) {
      const event = expandedEvents[index];
      if (!event) return;

      slideTitle.textContent = event.title;
      slideMeta.innerHTML = `
        <div>TIME: ${formatDate(event.datetime)}</div>
        <div>PLACE: ${event.location || "ATLANTA"}</div>
        <div>PRICE: ${event.price || "N/A"}</div>
      `;
      slideLink.href = event.link || "#";
      slideLink.style.display = event.link ? "inline-block" : "none";
      slideCount.textContent = `EVENT ${index + 1} / ${expandedEvents.length}`;
      slideDateBadge.textContent = formatBadgeDate(event.datetime);
      slideRecurringTag.innerHTML = event.recurring === "weekly"
        ? '<span class="recurring-tag">WEEKLY EVENT</span>'
        : '';
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % expandedEvents.length;
      renderSlide(currentIndex);
    }

    function prevSlide() {
      currentIndex = (currentIndex - 1 + expandedEvents.length) % expandedEvents.length;
      renderSlide(currentIndex);
    }

    function startAutoplay() {
      stopAutoplay();
      timer = setInterval(() => {
        if (autoplay && expandedEvents.length > 1) nextSlide();
      }, 3500);
    }

    function stopAutoplay() {
      if (timer) clearInterval(timer);
    }

    function toggleAutoplay() {
      autoplay = !autoplay;
      pauseBtn.textContent = autoplay ? "PAUSE" : "PLAY";
    }

    prevBtn.addEventListener("click", prevSlide);
    nextBtn.addEventListener("click", nextSlide);
    pauseBtn.addEventListener("click", toggleAutoplay);

    fetch("./events.json")
      .then(res => {
        if (!res.ok) throw new Error("Could not load events.json");
        return res.json();
      })
      .then(data => {
        expandedEvents = expandRecurringEvents(data);
        if (!expandedEvents.length) {
          showEmptyState();
          return;
        }
        renderSlide(currentIndex);
        startAutoplay();
      })
      .catch(() => {
        showEmptyState();
      });
  </script>
</body>
</html>
