<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlanta Pixel Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eaf4e2;
      --bg-dark: #d4e7c8;
      --card: #f4fbef;
      --panel: #dbeecf;
      --text: #2f4a34;
      --muted: #5f7a63;
      --accent: #90b77d;
      --accent-dark: #6f9661;
      --border: #6b8f68;
      --shadow: #b7ceb0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Press Start 2P", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(0deg, rgba(255,255,255,0.15), rgba(255,255,255,0.15)),
        repeating-linear-gradient(
          0deg,
          var(--bg) 0px,
          var(--bg) 16px,
          var(--bg-dark) 16px,
          var(--bg-dark) 32px
        );
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 4px solid var(--border);
      box-shadow:
        0 0 0 4px var(--card),
        0 0 0 8px var(--border),
        8px 8px 0 0 var(--shadow);
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1rem;
      line-height: 1.6;
    }

    p {
      margin: 0 0 22px;
      font-size: 0.55rem;
      line-height: 1.9;
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 14px;
    }

    a {
      border: 4px solid var(--border);
      background: var(--accent);
      color: #f7fff4;
      text-decoration: none;
      padding: 14px 16px;
      font-size: 0.55rem;
      line-height: 1.8;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    a:hover {
      background: var(--accent-dark);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ATLANTA PIXEL PLANNER</h1>
    <p>Choose which page you want to open.</p>
    <div class="links">
      <a href="./slideshow.html">OPEN SLIDESHOW</a>
      <a href="./calendar.html">OPEN CALENDAR</a>
    </div>
  </div>
</body>
</html>
